<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#000;
    color:white;
    overflow:hidden;
}

/* BACKGROUND */

.bg1{
    position:fixed;
    width:600px;
    height:600px;
    background:rgba(168,85,247,0.18);
    border-radius:50%;
    filter:blur(120px);
    top:-250px;
    right:-200px;
    z-index:-1;
}

.bg2{
    position:fixed;
    width:550px;
    height:550px;
    background:rgba(168,85,247,0.12);
    border-radius:50%;
    filter:blur(120px);
    bottom:-250px;
    left:-200px;
    z-index:-1;
}

/* TOP BAR */

.top-bar{
    position:fixed;
    top:18px;
    left:20px;
    display:flex;
    align-items:center;
    gap:14px;
    z-index:999;
}

.clock{
    font-size:16px;
    color:#c084fc;
    font-weight:bold;
}

.watermark{
    color:white;
    font-size:15px;
    font-weight:bold;
    letter-spacing:2px;
    opacity:0.9;
}

/* PROGRESS */

.progress-container{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:5px;
    background:#111;
    z-index:999;
}

.progress-bar{
    width:0%;
    height:100%;
    background:#a855f7;
    transition:0.4s;
}

/* CONTAINER */

.container{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:25px;
}

/* SLIDE */

.slide{
    position:absolute;
    width:100%;
    max-width:1380px;
    opacity:0;
    transform:translateX(100px);
    transition:0.6s ease;
    pointer-events:none;
}

.slide.active{
    opacity:1;
    transform:translateX(0);
    pointer-events:auto;
}

/* CONTENT BOX */

.content-box{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(168,85,247,0.4);
    border-radius:32px;
    padding:75px;
    backdrop-filter:blur(12px);
    box-shadow:0 0 40px rgba(168,85,247,0.15);
    position:relative;
    min-height:720px;
}

/* NAVIGATION */

.navigation-box{
    margin-top:20px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(168,85,247,0.35);
    border-radius:20px;
    padding:18px;
    display:flex;
    justify-content:center;
    gap:14px;
    backdrop-filter:blur(10px);
}

/* NUMBER */

.slide-number{
    position:absolute;
    top:25px;
    right:30px;
    color:#777;
    font-size:15px;
}

/* TEXT */

h1{
    font-size:55px;
    margin-bottom:35px;
    line-height:1.2;
}

p{
    font-size:24px;
    line-height:2.4;
    color:#ddd;
}

.highlight{
    color:#c084fc;
    border-bottom:3px solid #c084fc;
    font-weight:bold;
    padding-bottom:2px;
}

/* BUTTON */

button{
    width:100px;
    height:42px;
    border:none;
    border-radius:12px;
    background:rgba(168,85,247,0.12);
    border:2px solid #a855f7;
    color:white;
    font-size:14px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#a855f7;
    transform:translateY(-2px);
    box-shadow:0 0 15px rgba(168,85,247,0.5);
}

/* RESPONSIVE */

@media(max-width:900px){

    body{
        overflow:auto;
    }

    .top-bar{
        top:15px;
        left:15px;
        gap:10px;
    }

    .container{
        padding:15px;
    }

    .content-box{
        padding:35px;
        min-height:auto;
    }

    h1{
        font-size:34px;
    }

    p{
        font-size:18px;
        line-height:2.1;
    }

    button{
        width:90px;
        height:40px;
        font-size:13px;
    }

}

</style>
</head>

/* ========================= */
/* CREATE SLIDES */
/* ========================= */

const container =
document.getElementById("slidesContainer");

materials.forEach((item,index)=>{

container.innerHTML += `

<div class="slide ${index === 0 ? 'active' : ''}">

<div class="content-box">

<div class="slide-number">
${index + 1} / ${materials.length}
</div>

<h1>
${item.title}
</h1>

<p>
${item.content}
</p>

</div>

<div class="navigation-box">

<button onclick="prevSlide()">
Before
</button>

<button onclick="nextSlide()">
Next
</button>

</div>

</div>

`;

});

/* ========================= */
/* SLIDE SYSTEM */
/* ========================= */

const slides =
document.querySelectorAll(".slide");

const progressBar =
document.getElementById("progressBar");

let currentSlide = 0;

function showSlide(index){

slides.forEach((slide)=>{
slide.classList.remove("active");
});

slides[index].classList.add("active");

updateProgress();
}

function nextSlide(){

currentSlide++;

if(currentSlide >= slides.length){
currentSlide = 0;
}

showSlide(currentSlide);
}

function prevSlide(){

currentSlide--;

if(currentSlide < 0){
currentSlide = slides.length - 1;
}

showSlide(currentSlide);
}

/* PROGRESS */

function updateProgress(){

const progress =
((currentSlide + 1) / slides.length) * 100;

progressBar.style.width = progress + "%";
}

updateProgress();

/* KEYBOARD */

document.addEventListener("keydown",(e)=>{

if(e.key === "ArrowRight"){
nextSlide();
}

if(e.key === "ArrowLeft"){
prevSlide();
}

});

/* CLOCK */

function updateClock(){

const now = new Date();

let hours =
now.getHours().toString().padStart(2,"0");

let minutes =
now.getMinutes().toString().padStart(2,"0");

let seconds =
now.getSeconds().toString().padStart(2,"0");

document.getElementById("clock").innerHTML =
hours + ":" + minutes + ":" + seconds;
}

setInterval(updateClock,1000);

updateClock();

</script>
